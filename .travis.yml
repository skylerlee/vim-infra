language: generic
services:
  - docker
before_install:
  - docker pull skylerlee/vim-testbed
jobs:
  include:
    - env: VIM=vim73
    - env: VIM=vim74
    - env: VIM=vim8
    - env: VIM=vim-latest
before_script:
  - git clone https://github.com/junegunn/vader.vim.git cache/vader.vim
script:
  - |
    docker run -it --rm \
    -v $PWD:/testplugin \
    skylerlee/vim-testbed \
    $VIM -u test/vimrc -c '+Vader! test/**/*.vader'
